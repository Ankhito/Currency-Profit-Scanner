name: Release

on:
  workflow_dispatch:
  issues:
    types:
      - opened
  push:
    tags:
      - "v*"
    branches:
      - "v*"

permissions:
  contents: write
  issues: write

env:
  MANUAL_RELEASE_TAG: v0.1.3

jobs:
  build-release:
    if: github.event_name != 'issues' || github.event.issue.title == 'release: v0.1.3'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve release tag
        id: release
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            "tag=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          } else {
            "tag=$env:MANUAL_RELEASE_TAG" >> $env:GITHUB_OUTPUT
          }

      - name: Restore
        run: dotnet restore CurrencyProfitScanner.csproj

      - name: Install Dalamud dev files
        shell: pwsh
        run: |
          $hooks = Join-Path $env:APPDATA "XIVLauncher/addon/Hooks/dev"
          New-Item -ItemType Directory -Force -Path $hooks | Out-Null
          Invoke-WebRequest -UseBasicParsing "https://goatcorp.github.io/dalamud-distrib/latest.zip" -OutFile "$env:RUNNER_TEMP/dalamud.zip"
          Expand-Archive "$env:RUNNER_TEMP/dalamud.zip" -DestinationPath $hooks -Force

      - name: Build plugin package
        run: dotnet build CurrencyProfitScanner.csproj --configuration Release --no-restore

      - name: Locate Dalamud package
        id: package
        shell: pwsh
        run: |
          $zip = Get-ChildItem -Path bin/Release -Recurse -Filter latest.zip |
            Where-Object { $_.FullName -match '[\\/]CurrencyProfitScanner[\\/]latest\.zip$' } |
            Select-Object -First 1
          if (-not $zip) {
            $zip = Get-ChildItem -Path bin/Release -Recurse -Filter latest.zip | Select-Object -First 1
          }
          if (-not $zip) {
            throw "DalamudPackager did not produce latest.zip"
          }
          $asset = Join-Path $env:RUNNER_TEMP "CurrencyProfitScanner-latest.zip"
          Copy-Item $zip.FullName $asset -Force
          "zip=$asset" >> $env:GITHUB_OUTPUT

      - name: Publish release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.zip }}
          name: Currency Profit Scanner ${{ steps.release.outputs.tag }}
          tag_name: ${{ steps.release.outputs.tag }}
          target_commitish: ${{ github.sha }}
          overwrite_files: true
          make_latest: true

      - name: Close release trigger issue
        if: github.event_name == 'issues'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close ${{ github.event.issue.number }} --comment "Release workflow processed ${{ steps.release.outputs.tag }}."
